    <!-- Google tag (gtag.js) — deferred until first user interaction to reduce TBT -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function(){
        var loaded = false;
        function loadGtag(){
          if(loaded) return;
          loaded = true;
          gtag('js', new Date());
          gtag('config', 'G-RJT0J6Y6EZ');
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-RJT0J6Y6EZ';
          s.async = true;
          document.head.appendChild(s);
        }
        ['scroll','click','touchstart','keydown'].forEach(function(e){
          window.addEventListener(e, loadGtag, {once:true, passive:true});
        });
        // Fallback: load after 5s idle
        setTimeout(loadGtag, 5000);
      })();
    </script>

    <!-- Clear googtrans cookies on pages without language prefix (before GTranslate loads) -->
    <script>
      (function(){
        var langs = ["ar","bn","zh-cn","da","nl","et","fi","fr","de","el","iw","hi","hu","id","it","ja","km","ko","ms","no","fa","pl","pt","pa","ro","ru","sl","es","sv","th","tr","uk","ur","vi"];
        var parts = window.location.pathname.split('/').filter(Boolean);
        var first = (parts[0] || '').toLowerCase();
        var exp = 'expires=Thu, 01 Jan 1970 00:00:00 GMT';
        var h = window.location.hostname;

        function nukeGoogTrans() {
          document.cookie='googtrans=;'+exp+';path=/';
          document.cookie='googtrans=;'+exp+';path=/;domain='+h;
          document.cookie='googtrans=;'+exp+';path=/;domain=.'+h;
          document.cookie='googtrans=;'+exp;
          // Also try www variant
          document.cookie='googtrans=;'+exp+';path=/;domain=.www.'+h;
        }

        // Always nuke all googtrans cookies first
        nukeGoogTrans();

        var hasLangPrefix = langs.indexOf(first) !== -1;

        if (hasLangPrefix) {
          // URL has a language prefix — set exactly ONE clean cookie
          document.cookie='googtrans=/en/'+first+';path=/';
        }

        // After GTranslate loads (deferred), re-clear if no lang prefix
        // This prevents GTranslate from using stale cookies
        if (!hasLangPrefix) {
          var observer = new MutationObserver(function(mutations) {
            var select = document.querySelector('.gtranslate_wrapper select');
            if (select) {
              observer.disconnect();
              // Clear any cookie GTranslate may have restored
              nukeGoogTrans();
              // Reset dropdown to English
              if (select.value && select.value.toLowerCase() !== 'en') {
                select.value = 'en';
                select.dispatchEvent(new Event('change', { bubbles: true }));
              }
            }
          });
          observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
          // Safety timeout: stop observing after 10s
          setTimeout(function(){ observer.disconnect(); }, 10000);
        }
      })();
    </script>
